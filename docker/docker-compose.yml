# Gino — AI Agent in Docker
#
# Quick start:
#   cd docker
#   cp .env.example .env
#   # Edit .env — at minimum set OPENAI_API_KEY
#   docker compose up -d
#

services:
  gino:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gino:latest
    container_name: gino
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${GINO_DATA_PATH:-/opt/gino/data}:/home/gino/.gino
