services:
  # One-shot init: pulls the embedding model into Ollama on first run
  ollama-init:
    image: curlimages/curl
    container_name: ollama-init
    restart: "no"
    depends_on:
      - ollama
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until curl -s http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 2; done
        MODEL=${PICOBOT_BRAIN_EMBEDDING_MODEL:-nomic-embed-text}
        echo "Pulling embedding model: $MODEL"
        curl -s http://ollama:11434/api/pull -d "{\"name\": \"$MODEL\"}"
        echo "Done."

  picobot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: picobot
    restart: unless-stopped
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started
    environment:
      # Required: OpenAI-compatible API key (works with OpenRouter, OpenAI, etc.)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-or-v1-REPLACE_ME}
      # Optional: OpenAI-compatible API base URL
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      # Required: The LLM model to use
      - PICOBOT_MODEL=${PICOBOT_MODEL:-google/gemini-2.5-flash}
      # Optional: Maximum tokens for LLM responses (default: 8192)
      - PICOBOT_MAX_TOKENS=${PICOBOT_MAX_TOKENS:-8192}
      # Optional: Maximum tool iterations per request (default: 100)
      - PICOBOT_MAX_TOOL_ITERATIONS=${PICOBOT_MAX_TOOL_ITERATIONS:-100}
      # Optional: Show tool activity indicators during tool calls (default: true).
      - PICOBOT_ENABLE_TOOL_ACTIVITY_INDICATOR=${PICOBOT_ENABLE_TOOL_ACTIVITY_INDICATOR:-true}
      # Optional: Telegram bot token from @BotFather
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Optional: Comma-separated Telegram user IDs allowed to chat
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      # Optional: Discord bot token from Developer Portal
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # Optional: Comma-separated Discord user IDs allowed to chat
      - DISCORD_ALLOW_FROM=${DISCORD_ALLOW_FROM:-}
      # Optional: Slack App-Level Token (xapp-...), also enables the channel
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      # Optional: Slack Bot Token (xoxb-...), also enables the channel
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      # Optional: Comma-separated Slack user IDs allowed to chat
      - SLACK_ALLOW_USERS=${SLACK_ALLOW_USERS:-}
      # Optional: Comma-separated Slack channel IDs allowed to chat
      - SLACK_ALLOW_CHANNELS=${SLACK_ALLOW_CHANNELS:-}
      # Brain / Knowledge System
      - PICOBOT_BRAIN_ENABLED=${PICOBOT_BRAIN_ENABLED:-true}
      - PICOBOT_BRAIN_EMBEDDING_MODEL=${PICOBOT_BRAIN_EMBEDDING_MODEL:-nomic-embed-text}
      - PICOBOT_BRAIN_OLLAMA_URL=http://ollama:11434
    volumes:
      # Persist config, workspace, memory, skills, and brain database
      - ./picobot-data:/home/picobot/.picobot

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment for GPU acceleration (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-data:
